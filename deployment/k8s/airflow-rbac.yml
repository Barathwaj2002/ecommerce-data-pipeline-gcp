apiVersion: v1
kind: ServiceAccount
metadata:
  name: airflow-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: airflow-job-role
  namespace: default
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["create", "get", "list", "watch", "delete"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: airflow-job-rolebinding
  namespace: default
subjects:
- kind: ServiceAccount
  name: airflow-sa
  namespace: default
roleRef:
  kind: Role
  name: airflow-job-role
  apiGroup: rbac.authorization.k8s.io