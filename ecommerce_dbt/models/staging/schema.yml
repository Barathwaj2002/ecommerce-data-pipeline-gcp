version: 2
models:
  - name: stg_product_revenue
    description: "Staging model for product revenue data — cleaned and renamed from raw BigQuery table"
    columns:
      - name: Country
        description: "Country where the product was sold"
        tests:
          - not_null
          - dbt_expectations.expect_column_value_lengths_to_be_between:
              arguments:
                min_value: 2
                max_value: 50
      - name: TotalRevenue
        description: "Total revenue generated by this product in this country"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 1000000
      - name: ProductRank
        description: "Rank of product by revenue within its country"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 5
          
  - name: stg_customer_rfm
    columns:
      - name: CustomerId
        tests:
          - not_null
          - unique
      - name: Country
        tests:
          - not_null
      - name: Monetary
        description: "Monetary"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 10000000
      - name: Frequency
        description: "Frequency of purchase by the customer"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 10000
