version: 2
models:
  - name: stg_product_revenue
    description: "Staging model for product revenue data — cleaned and renamed from raw BigQuery table"
    columns:
      - name: Country
        description: "Country where the product was sold"
        tests:
          - not_null
      - name: TotalRevenue
        description: "Total revenue generated by this product in this country"
        tests:
          - not_null
      - name: ProductRank
        description: "Rank of product by revenue within its country"
        tests:
          - not_null
  - name: stg_customer_rfm
    columns:
      - name: CustomerId
        tests:
          - not_null
          - unique
      - name: Country
        tests:
          - not_null
